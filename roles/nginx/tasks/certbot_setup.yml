---
- name: Certbot 및 Nginx 플러그인 설치
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Nginx 서비스 중지 (인증서 발급 시 충돌 방지)
  service:
    name: nginx
    state: stopped
  ignore_errors: yes

- name: SSL 인증서 발급 (Certbot standalone 방식)
  command: >
    certbot certonly --standalone
    --non-interactive
    --agree-tos
    --email {{ certbot_email }}
    -d {{ item.server_name }}
  loop: "{{ nginx_apps }}"
  args:
    creates: "/etc/letsencrypt/live/{{ item.server_name }}/fullchain.pem"

- name: Nginx 서비스 시작
  service:
    name: nginx
    state: started
