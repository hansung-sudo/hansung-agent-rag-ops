---
- name: AWS CLI 설치
  apt:
    name: awscli
    state: present
    update_cache: yes

- name: AWS 설정 디렉토리 생성
  file:
    path: /root/.aws
    state: directory
    mode: "0700"

- name: AWS credentials 파일 배포
  copy:
    dest: /root/.aws/credentials
    mode: "0600"
    content: |
      [default]
      aws_access_key_id={{ aws_access_key_id }}
      aws_secret_access_key={{ aws_secret_access_key }}
      aws_session_token={{ aws_session_token }}
  no_log: true

- name: AWS config 파일 배포
  copy:
    dest: /root/.aws/config
    mode: "0600"
    content: |
      [default]
      region={{ aws_region }}
      output={{ aws_output_format }}
