---
- name: AWS CLI 설치 의존 패키지 설치
  apt:
    name:
      - unzip
      - curl
    state: present
    update_cache: yes

- name: AWS CLI 설치 여부 확인
  shell: command -v aws
  register: aws_cli_exists
  changed_when: false
  failed_when: false

- name: AWS CLI v2 설치 파일 다운로드
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip
    mode: "0644"
  when: aws_cli_exists.rc != 0

- name: AWS CLI v2 압축 해제
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: true
  when: aws_cli_exists.rc != 0

- name: AWS CLI v2 설치
  command: /tmp/aws/install --update
  when: aws_cli_exists.rc != 0

- name: AWS 설정 디렉토리 생성
  file:
    path: /root/.aws
    state: directory
    mode: "0700"

- name: 정적 AWS 자격증명 사용 여부 계산
  set_fact:
    use_static_aws_credentials: >-
      {{
        (aws_access_key_id | default('', true) | string | trim | length > 0)
        and
        (aws_secret_access_key | default('', true) | string | trim | length > 0)
      }}

- name: AWS credentials 파일 배포
  copy:
    dest: /root/.aws/credentials
    mode: "0600"
    content: |
      [default]
      aws_access_key_id={{ aws_access_key_id }}
      aws_secret_access_key={{ aws_secret_access_key }}
      {% if aws_session_token is defined and (aws_session_token | default('', true) | string | trim | length > 0) %}
      aws_session_token={{ aws_session_token }}
      {% endif %}
  no_log: true
  when: use_static_aws_credentials

- name: 비어있는 정적 자격증명 파일 제거
  file:
    path: /root/.aws/credentials
    state: absent
  when: not use_static_aws_credentials

- name: AWS config 파일 배포
  copy:
    dest: /root/.aws/config
    mode: "0600"
    content: |
      [default]
      region={{ aws_region }}
      output={{ aws_output_format }}

- name: AWS CLI 버전 확인
  command: aws --version
  register: aws_cli_version
  changed_when: false
