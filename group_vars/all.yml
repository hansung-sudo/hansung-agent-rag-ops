---
# 공통 변수 설정
docker_version: "latest"
docker_compose_version: "2.21.0"

log_path: "/var/log/hansung-rag"
app_name: "hansung-agent-rag"

# CloudWatch Agent 설정 관련
cw_agent_config_path: "/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json"

# CloudWatch Dashboard 설정 관련
cw_dashboard_name: "amazon-cloudwatch-llm-observability"

aws_region: "ap-northeast-2"
vm_swappiness: 80
zram_percent: 50
zram_priority: 100
